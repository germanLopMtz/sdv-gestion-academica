name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para SonarQube (historial completo)

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Instalar dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Instalar dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Iniciar análisis SonarQube
        run: |
          dotnet sonarscanner begin \
            /k:"sdv-backend" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**"
        working-directory: sdv-backend

      - name: Compilar proyecto
        run: dotnet build --no-incremental
        working-directory: sdv-backend

      - name: Ejecutar cobertura de código
        run: dotnet-coverage collect "dotnet test" -f xml -o "coverage.xml"
        working-directory: sdv-backend

      - name: Finalizar análisis SonarQube
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        working-directory: sdv-backend
